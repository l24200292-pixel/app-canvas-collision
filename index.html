<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mixamo Animation Control</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="./favicon.png">

    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }

        /* TÍTULO ARRIBA */
        #title {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 22px;
            color: #00d2ff;
            z-index: 10;
        }

        #interface {
            position: absolute;
            top: 60px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00d2ff;
            z-index: 10;
        }

        kbd {
            background: #eee;
            color: #333;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            display: none;
        }

        /* NOMBRE ABAJO */
        #footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #aaa;
            z-index: 10;
        }
    </style>
</head>

<body>

    <!-- TÍTULO DE LA ACTIVIDAD -->
    <div id="title">Actividad: Control de Animaciones 3D con Three.js</div>

    <div id="loading-screen">
        <div id="status-box">
            <h2 id="status-text">Cargando Samba Dancing.fbx...</h2>
            <p id="error-info" class="error-msg">Error: No se encuentra el archivo. Revisa la consola (F12).</p>
        </div>
    </div>

    <div id="interface">
        <h2 style="margin-top:0; color:#00d2ff;">CONTROLES</h2>
        <p><kbd>1</kbd> Samba Dancing</p>
        <p><kbd>2</kbd> Macarena Dance</p>
        <p><kbd>3</kbd> Hip Hop Dancing</p>
        <p><kbd>4</kbd> Belly Dancing</p>
        <p><kbd>5</kbd> Can Can Dance</p>
    </div>

    <!-- NOMBRE DEL PROGRAMADOR -->
    <div id="footer">Programador:ANAHI DIAZ ROSALES</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        let camera, scene, renderer, mixer, currentAction;
        let actions = {};
        const clock = new THREE.Clock();

        const animFiles = [
            'Samba Dancing',
            'Macarena Dance',
            'Hip Hop Dancing',
            'Belly Dancing',
            'Can Can Dance'
        ];

        const baseUrl = './assets/models/fbx/';

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(100, 200, 400);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 3);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 100, 0);
            controls.update();

            const loader = new FBXLoader();

            loader.load(`${baseUrl}${animFiles[0]}.fbx`, (fbx) => {
                const object = fbx;
                object.scale.set(0.8, 0.8, 0.8);

                mixer = new THREE.AnimationMixer(object);

                const action = mixer.clipAction(fbx.animations[0]);
                actions[animFiles[0]] = action;
                currentAction = action;
                action.play();

                scene.add(object);
                document.getElementById('loading-screen').style.display = 'none';

                animFiles.slice(1).forEach(name => {
                    loader.load(`${baseUrl}${name}.fbx`, (animFBX) => {
                        actions[name] = mixer.clipAction(animFBX.animations[0]);
                        console.log("Cargado:", name);
                    });
                });

            }, undefined, (err) => {
                console.error("ERROR DE CARGA:", err);
                document.getElementById('error-info').style.display = 'block';
                document.getElementById('status-text').innerText = "Archivo no encontrado";
            });

            window.addEventListener('keydown', (e) => {
                const keys = {'1':0, '2':1, '3':2, '4':3, '5':4};
                const idx = keys[e.key];

                if (idx !== undefined && actions[animFiles[idx]]) {
                    const next = actions[animFiles[idx]];
                    if (currentAction !== next) {
                        currentAction.fadeOut(0.5);
                        next.reset().fadeIn(0.5).play();
                        currentAction = next;
                    }
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }
    </script>

</body>
</html>
